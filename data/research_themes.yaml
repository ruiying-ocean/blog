# Research theme cards shown on /research/ (rendered by the `research-cards` shortcode).
# `image` is a filename inside the content/research/ page bundle.
# `desc` supports Markdown (e.g. *italics*, `code`, [links](...)).
- tag: Plankton
  title: "Plankton ecology & evolution"
  image: foram.png
  alt: "Planktic foraminifera shells under the microscope"
  desc: >-
    Planktic foraminifera are calcifying zooplankton whose shells form the best
    microfossil record on Earth. I use trait-based approaches to understand how
    their ecology — symbiosis, spines, body size — responds to a changing ocean.

- tag: Communities
  title: "Community ecology"
  image: community.png
  alt: "Modelled size-structured plankton community assembling over time"
  desc: >-
    Plankton don't live alone. With size-structured, trait-based models I study how
    competition, grazing, and the environment assemble plankton communities and
    govern their diversity, body-size structure, and succession through time.

- tag: Modelling
  title: "Ocean biogeochemistry modelling"
  image: planktom_npp.png
  alt: "PlankTOM12 modelled global ocean net primary production"
  desc: >-
    I build and use global ocean biogeochemistry and Earth system models — from
    PlankTOM to cGENIE — to link plankton ecology to the cycling of carbon and
    nutrients, across the modern ocean and deep time. I also maintain the `cgeniepy`
    Python package.

- tag: Palaeoclimate
  title: "Past & future climate change"
  image: lgm.png
  alt: "Last Glacial Maximum sea surface temperature map"
  desc: >-
    From the Last Glacial Maximum to the end-Cretaceous extinction, the geological
    record reveals how life responds to climate upheaval — and what limits its
    capacity to adapt to the warming ahead.
